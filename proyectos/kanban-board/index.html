<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List | Administrador de Tareas Básico</title>
    <meta name="description"
        content="ToDo List - Tablero interactivo sencillo para organizar pendientes cotidianos en columnas de forma fácil.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Estilos -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dark-theme">

    <!-- Header / Navbar -->
    <header class="board-header">
        <div class="container board-header-container">
            <a href="#" class="board-logo">
                <i class="fa-solid fa-check-double logo-icon"></i> ToDo <span
                    class="logo-accent">List</span>
            </a>

            <div class="board-actions">
                <button class="btn btn-primary" id="btn-new-task">
                    <i class="fa-solid fa-plus"></i> Registrar Tarea
                </button>
            </div>
        </div>
    </header>

    <!-- Kanban Board Container -->
    <main class="board-main">
        <div class="container">

            <div class="board-grid" id="kanban-board-grid">

                <!-- Column 1: Todo -->
                <section class="board-column" data-column="todo">
                    <div class="column-header border-todo">
                        <h3 class="column-title">Por Hacer</h3>
                        <span class="column-badge badge-todo" id="badge-todo">0</span>
                    </div>
                    <div class="cards-container" id="container-todo">
                        <!-- Dynamic Cards here -->
                    </div>
                </section>

                <!-- Column 2: In Progress -->
                <section class="board-column" data-column="progress">
                    <div class="column-header border-progress">
                        <h3 class="column-title">En Proceso</h3>
                        <span class="column-badge badge-progress" id="badge-progress">0</span>
                    </div>
                    <div class="cards-container" id="container-progress">
                        <!-- Dynamic Cards here -->
                    </div>
                </section>

                <!-- Column 3: Done -->
                <section class="board-column" data-column="done">
                    <div class="column-header border-done">
                        <h3 class="column-title">Terminado</h3>
                        <span class="column-badge badge-done" id="badge-done">0</span>
                    </div>
                    <div class="cards-container" id="container-done">
                        <!-- Dynamic Cards here -->
                    </div>
                </section>

            </div>

        </div>
    </main>

    <!-- Modal Form: Add / Edit Task -->
    <div class="modal-backdrop" id="task-modal">
        <div class="board-modal">
            <button class="close-modal-btn" id="close-modal" aria-label="Cerrar ventana"><i
                    class="fa-solid fa-xmark"></i></button>

            <div class="modal-header-content">
                <h3 class="modal-title" id="modal-title-text">Registrar Nueva Tarea</h3>
                <p class="modal-subtitle">Crea y organiza tus pendientes académicos y cotidianos de forma muy sencilla.
                </p>
            </div>

            <form id="task-form" class="modal-form" novalidate>
                <!-- Hidden input to store task ID when editing -->
                <input type="hidden" id="task-id-field">

                <div class="form-group">
                    <label for="task-title">Título de la Tarea</label>
                    <input type="text" id="task-title" class="form-control"
                        placeholder="Ej. Estudiar para el examen de cálculo" required>
                    <span class="form-error" id="title-error">El título de la tarea es obligatorio.</span>
                </div>

                <div class="form-group">
                    <label for="task-desc">Detalle o Descripción</label>
                    <textarea id="task-desc" class="form-control" rows="3"
                        placeholder="Describe brevemente qué necesitas hacer..." required></textarea>
                    <span class="form-error" id="desc-error">La descripción debe tener al menos 5 caracteres.</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-priority">Prioridad</label>
                        <select id="task-priority" class="form-control">
                            <option value="low">Baja</option>
                            <option value="medium" selected>Media</option>
                            <option value="high">Alta</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="task-date">Fecha Límite</label>
                        <input type="date" id="task-date" class="form-control" required>
                        <span class="form-error" id="date-error">Seleccione una fecha de vencimiento.</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="task-submit-btn">Guardar Tarea</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="board-footer">
        <div class="container board-footer-container">
            <p>&copy; Angie Fuentes</p>
        </div>
    </footer>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>

</html>
